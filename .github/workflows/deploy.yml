name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

# Allow only one concurrent deployment; cancel any in-progress run when a new one starts.
concurrency:
  group: "pages"
  cancel-in-progress: true

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Inject API Key
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Finds the placeholder in script.js and replaces it with the secret.
          # The secret is passed via an env var (not inline) so shell-special characters
          # in the key are handled safely. The | delimiter avoids conflicts with any /
          # characters that may appear in the key value.
          sed -i "/^const API_KEY = /s|GEMINI_API_KEY_PLACEHOLDER|${GEMINI_API_KEY}|" script.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
